<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="description" content="An educational infinite-scroller game about the academic career path of a physicist and data scientist." />
  <meta property="og:title" content="Sci-Runner: The Scientist's Journey" />
  <meta property="og:description" content="Collect skills, earn fellowships, dodge setbacks — and make it to Principal Investigator!" />
  <title>Sci-Runner: The Scientist's Journey</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a;
      color: #e0ddd4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      gap: 12px;
    }
    header { text-align: center; }
    header h1 {
      font-size: clamp(18px, 4vw, 26px);
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #f0f0f0;
    }
    header p { font-size: clamp(11px, 2.5vw, 13px); color: #888; margin-top: 4px; }
    #game-wrap { width: 100%; max-width: 680px; }
    canvas {
      width: 100%;
      display: block;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      touch-action: none;
      cursor: pointer;
    }
    #hint { font-size: 11px; color: #555; text-align: center; }
    footer { font-size: 11px; color: #444; text-align: center; }
    footer a { color: #666; text-decoration: none; }
    footer a:hover { color: #888; }
  </style>
</head>
<body>

  <header>
    <h1>Sci-Runner</h1>
    <p>The Scientist's Journey &middot; undergrad to principal investigator</p>
  </header>

  <div id="game-wrap">
    <canvas id="gc" width="680" height="400"></canvas>
  </div>

  <p id="hint">SPACE or tap to jump &middot; double-tap for double-jump &middot; collect skills &middot; dodge setbacks</p>

  <footer>
    <p>Sci-Runner &middot; an educational game about the academic path in physics &amp; data science</p>
  </footer>

  <script>
    const cv = document.getElementById('gc');
    const ctx = cv.getContext('2d');
    const W = 680, H = 400, GY = 318;
    let st = 'start', animF = 0, tick = 0, score = 0, lives = 3, lvl = 0;
    let skillsGot = new Set(), grantsGot = 0, ents = [], bgObjs = [], spd = 3;
    const P = { x: 100, y: GY, vy: 0, grounded: true, inv: 0, jc: 0 };
    const PW = 20, PH = 50;

    const LEVELS = [
      { name: 'Undergraduate', sub: 'Years 1-4',
        skills: ['Calculus', 'Linear Algebra', 'Physics', 'Chemistry', 'Programming'],
        grantsReq: 0, col: '#2C7BE5', bgC: '#0d1a2e', spd: 3.2 },
      { name: "Master's Degree", sub: 'Years 5-6',
        skills: ['Statistics', 'ML Basics', 'Research Methods', 'Data Analysis', 'Thesis Writing'],
        grantsReq: 0, col: '#7B5CB8', bgC: '#130d24', spd: 4.6 },
      { name: 'PhD Program', sub: 'Years 7-11',
        skills: ['Deep Learning', 'Grant Writing', 'Publishing', 'Lab Management', 'Specialization'],
        grantsReq: 1, col: '#18905A', bgC: '#0a1c14', spd: 5.8 },
      { name: 'Postdoctoral Research', sub: 'Years 12-15',
        skills: ['Teaching', 'Networking', 'Leadership', 'Mentorship', 'Innovation'],
        grantsReq: 2, col: '#D0601A', bgC: '#1e0e04', spd: 7.2 },
      { name: 'Principal Investigator', sub: 'Year 15+',
        skills: ['Lab Direction', 'Policy Work', 'Industry Collab', 'Tenure', 'Legacy Research'],
        grantsReq: 3, col: '#B52B2B', bgC: '#1c0808', spd: 8.8 }
    ];

    const OBS = [
      { lbl: 'Rival Scientist', c: '#B03030' }, { lbl: 'Rejected Paper', c: '#8E3060' },
      { lbl: 'Lab Failure', c: '#5A3494' }, { lbl: 'Budget Cut', c: '#BF5B0A' },
      { lbl: 'Imposter Syndrome', c: '#2C3E50' }
    ];
    const GRANTS = ['NSF Fellowship', 'NIH Grant', 'DOE Award', 'Sloan Fellowship'];

    function rr(x, y, w, h, r, fill, stroke) {
      const kr = Math.min(r, h / 2, w / 2);
      ctx.beginPath();
      ctx.moveTo(x + kr, y); ctx.arcTo(x + w, y, x + w, y + h, kr);
      ctx.arcTo(x + w, y + h, x, y + h, kr); ctx.arcTo(x, y + h, x, y, kr);
      ctx.arcTo(x, y, x + w, y, kr); ctx.closePath();
      if (fill != null) { ctx.fillStyle = fill; ctx.fill(); }
      if (stroke != null) { ctx.strokeStyle = stroke; ctx.stroke(); }
    }

    function makeBg() {
      bgObjs = [];
      for (let i = 0; i < 12; i++) {
        const t = Math.random() < 0.55 ? 'cloud' : 'bldg';
        bgObjs.push({ x: Math.random() * W, y: t === 'cloud' ? 40 + Math.random() * 110 : 110 + Math.random() * 90, sw: 0.3 + Math.random() * 0.7, type: t });
      }
    }

    function resetPlay() { P.y = GY; P.vy = 0; P.grounded = true; P.inv = 0; P.jc = 0; ents = []; tick = 0; }
    function fullReset() { skillsGot = new Set(); grantsGot = 0; score = 0; lives = 3; lvl = 0; spd = LEVELS[0].spd; makeBg(); resetPlay(); }

    function jump() {
      if (P.grounded) { P.vy = -15; P.grounded = false; P.jc = 1; }
      else if (P.jc < 2) { P.vy = -12; P.jc = 2; }
    }

    function spawn() {
      const L = LEVELS[lvl];
      const need = L.skills.filter(s => !skillsGot.has(s));
      const needG = Math.max(0, L.grantsReq - grantsGot);
      const r = Math.random();
      if (r < 0.38 && need.length > 0) {
        const sk = need[Math.floor(Math.random() * need.length)];
        const hi = Math.random() < 0.42;
        ents.push({ t: 'sk', lbl: sk, x: W + 44, y: hi ? GY - 108 : GY - 14, w: 92, h: 26, c: L.col, ok: true });
      } else if (r < 0.52 && needG > 0) {
        ents.push({ t: 'gr', lbl: GRANTS[Math.floor(Math.random() * GRANTS.length)], x: W + 56, y: GY - 102, w: 114, h: 26, c: '#C9A000', ok: true });
      } else {
        const ob = OBS[Math.floor(Math.random() * OBS.length)];
        ents.push({ t: 'ob', lbl: ob.lbl, x: W + 50, y: GY - 20, w: 102, h: 28, c: ob.c, ok: true });
      }
    }

    function checkDone() {
      const L = LEVELS[lvl];
      if (L.skills.every(s => skillsGot.has(s)) && grantsGot >= L.grantsReq)
        st = lvl >= LEVELS.length - 1 ? 'win' : 'levelup';
    }

    function update() {
      if (st !== 'play') return;
      tick++; score++;
      P.vy += 0.72; P.y += P.vy;
      if (P.y >= GY) { P.y = GY; P.vy = 0; P.grounded = true; P.jc = 0; }
      if (P.inv > 0) P.inv--;
      bgObjs.forEach(b => { b.x -= spd * (b.type === 'cloud' ? 0.17 : 0.43); if (b.x < -280) b.x = W + 280; });
      const rate = Math.max(50, 105 - lvl * 9);
      if (tick % rate === 0) spawn();
      const px = P.x - PW / 2, py = P.y - PH;
      ents.forEach(e => {
        e.x -= spd;
        if (!e.ok) return;
        const ex = e.x - e.w / 2, ey = e.y - e.h / 2;
        if (px < ex + e.w && px + PW > ex && py < ey + e.h && py + PH > ey) {
          if (e.t === 'sk') { e.ok = false; skillsGot.add(e.lbl); checkDone(); }
          else if (e.t === 'gr') { e.ok = false; grantsGot++; checkDone(); }
          else if (P.inv === 0) { e.ok = false; P.inv = 90; lives--; if (lives <= 0) st = 'over'; }
        }
      });
      ents = ents.filter(e => e.x > -160 && e.ok);
    }

    function drawPlayer() {
      if (P.inv > 0 && animF % 6 < 3) return;
      const x = P.x, y = P.y;
      ctx.save();
      ctx.fillStyle = '#1A252F'; ctx.fillRect(x - 12, y - 3, 11, 4); ctx.fillRect(x + 1, y - 3, 11, 4);
      ctx.fillStyle = '#2C3E50'; ctx.fillRect(x - 8, y - 15, 7, 13); ctx.fillRect(x + 1, y - 15, 7, 13);
      ctx.fillStyle = '#ECF0F1'; ctx.fillRect(x - 12, y - 38, 24, 24);
      ctx.fillStyle = '#CDD5D8'; ctx.fillRect(x - 2, y - 38, 4, 11);
      const sw = Math.sin(animF * 0.24) * 7;
      ctx.fillStyle = '#ECF0F1'; ctx.fillRect(x - 19, y - 37 + sw, 8, 15); ctx.fillRect(x + 11, y - 37 - sw, 8, 15);
      ctx.fillStyle = '#FDBCB4'; ctx.fillRect(x - 19, y - 24 + sw, 8, 5); ctx.fillRect(x + 11, y - 24 - sw, 8, 5);
      ctx.fillStyle = '#FDBCB4'; ctx.fillRect(x - 3, y - 41, 6, 5);
      ctx.beginPath(); ctx.ellipse(x, y - 49, 11, 12, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#3D2B1F'; ctx.fillRect(x - 11, y - 62, 22, 8);
      ctx.beginPath(); ctx.ellipse(x, y - 57, 11, 6, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#555'; ctx.lineWidth = 1.3;
      ctx.strokeRect(x - 10, y - 53, 8, 6); ctx.strokeRect(x + 2, y - 53, 8, 6);
      ctx.beginPath(); ctx.moveTo(x - 2, y - 50); ctx.lineTo(x + 2, y - 50); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x - 10, y - 50); ctx.lineTo(x - 14, y - 49); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + 10, y - 50); ctx.lineTo(x + 14, y - 49); ctx.stroke();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(x - 5, y - 49, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + 5, y - 49, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    function drawBg() {
      const L = LEVELS[Math.min(lvl, LEVELS.length - 1)];
      ctx.fillStyle = L.bgC; ctx.fillRect(0, 0, W, GY + 2);
      bgObjs.forEach(b => {
        ctx.save();
        if (b.type === 'cloud') {
          ctx.globalAlpha = 0.3; ctx.fillStyle = '#fff';
          const bw = 65 + b.sw * 90;
          ctx.beginPath(); ctx.ellipse(b.x, b.y, bw * 0.55, 16, 0, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.ellipse(b.x + bw * 0.18, b.y - 13, bw * 0.32, 13, 0, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.ellipse(b.x - bw * 0.16, b.y - 9, bw * 0.28, 11, 0, 0, Math.PI * 2); ctx.fill();
        } else {
          const bw = 34 + b.sw * 54, bh = GY - b.y;
          ctx.globalAlpha = 0.12; ctx.fillStyle = L.col; ctx.fillRect(b.x, b.y, bw, bh);
          ctx.globalAlpha = 0.08; ctx.fillStyle = '#FFFDE7';
          for (let wi = 0; wi < Math.floor(bw / 14); wi++)
            for (let hi = 0; hi < Math.floor(bh / 16); hi++)
              ctx.fillRect(b.x + 4 + wi * 14, b.y + 5 + hi * 16, 8, 9);
        }
        ctx.restore();
      });
      ctx.fillStyle = L.col + '1A'; ctx.fillRect(0, GY, W, H - GY);
      ctx.strokeStyle = L.col; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0, GY); ctx.lineTo(W, GY); ctx.stroke();
    }

    function drawEnts() {
      ents.forEach(e => {
        if (!e.ok) return;
        ctx.save();
        const ex = e.x - e.w / 2, ey = e.y - e.h / 2;
        if (e.t === 'ob') {
          rr(ex, ey, e.w, e.h, 4, e.c);
          ctx.save(); rr(ex, ey, e.w, e.h, 4); ctx.clip();
          ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 7;
          for (let sx = ex - 15; sx < ex + e.w + 15; sx += 9) {
            ctx.beginPath(); ctx.moveTo(sx, ey); ctx.lineTo(sx + 22, ey + e.h); ctx.stroke();
          }
          ctx.restore();
          ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.font = '500 9px sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(e.lbl, e.x, e.y);
        } else if (e.t === 'sk') {
          rr(ex, ey, e.w, e.h, 13, e.c);
          ctx.globalAlpha = 0.22; rr(ex + 4, ey + 3, e.w - 8, (e.h - 6) / 2, 8, '#fff');
          const pulse = 0.4 + 0.6 * Math.abs(Math.sin(animF * 0.1 + e.x * 0.011));
          ctx.globalAlpha = pulse; ctx.lineWidth = 2;
          rr(ex - 3, ey - 3, e.w + 6, e.h + 6, 16, undefined, e.c);
          ctx.globalAlpha = 1; ctx.fillStyle = '#fff'; ctx.font = '400 9px sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(e.lbl, e.x, e.y);
        } else if (e.t === 'gr') {
          rr(ex, ey, e.w, e.h, 13, '#D4A800');
          ctx.globalAlpha = 0.2; rr(ex + 4, ey + 3, e.w - 8, (e.h - 6) / 2, 8, '#fff');
          const gp = 0.3 + 0.7 * Math.abs(Math.sin(animF * 0.07 + e.x * 0.009));
          ctx.globalAlpha = gp; ctx.lineWidth = 2.5;
          rr(ex - 4, ey - 4, e.w + 8, e.h + 8, 17, undefined, '#F0C030');
          ctx.globalAlpha = 1; ctx.fillStyle = '#3A2800'; ctx.font = '500 9px sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(e.lbl, e.x, e.y);
        }
        ctx.restore();
      });
    }

    function drawHUD() {
      const L = LEVELS[Math.min(lvl, LEVELS.length - 1)];
      ctx.fillStyle = 'rgba(15,15,26,0.88)'; ctx.fillRect(0, 0, W, 58);
      ctx.strokeStyle = L.col + '55'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, 58); ctx.lineTo(W, 58); ctx.stroke();
      ctx.fillStyle = L.col; ctx.font = '500 12px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.fillText(L.name.toUpperCase(), 12, 7);
      ctx.fillStyle = '#666'; ctx.font = '400 10px sans-serif'; ctx.fillText(L.sub, 12, 22);
      ctx.fillStyle = '#bbb'; ctx.font = '500 11px sans-serif'; ctx.textAlign = 'right';
      ctx.fillText('Score: ' + score, W - 52, 7);
      for (let i = 0; i < 3; i++) {
        ctx.fillStyle = i < lives ? '#E0402A' : '#333';
        ctx.beginPath(); ctx.arc(W - 42 + i * 16, 19, 5.5, 0, Math.PI * 2); ctx.fill();
      }
      const L2 = LEVELS[Math.min(lvl, LEVELS.length - 1)];
      const tots = L2.skills.length, cols = L2.skills.filter(s => skillsGot.has(s)).length;
      rr(12, 34, W - 24, 8, 4, '#1a1a2e');
      if (cols > 0) rr(12, 34, Math.max(8, (W - 24) * cols / tots), 8, 4, L.col);
      ctx.fillStyle = '#555'; ctx.font = '400 10px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      const gStr = L2.grantsReq > 0 ? '  ·  Grants: ' + Math.min(grantsGot, L2.grantsReq) + '/' + L2.grantsReq : '';
      ctx.fillText('Skills: ' + cols + '/' + tots + gStr, 12, 46);
    }

    function drawStart() {
      const L = LEVELS[0];
      ctx.fillStyle = '#0d1220'; ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < 60; i++) {
        const sx = (i * 71 + 13) % W, sy = (i * 53 + 17) % (H - 80);
        ctx.globalAlpha = 0.2 + 0.4 * Math.abs(Math.sin(animF * 0.02 + i * 0.35));
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(sx, sy, 1, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.fillStyle = L.col; ctx.font = '500 34px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('Sci-Runner', W / 2, H / 2 - 66);
      ctx.fillStyle = '#bbb'; ctx.font = '400 15px sans-serif';
      ctx.fillText("The Scientist's Journey", W / 2, H / 2 - 29);
      ctx.fillStyle = '#666'; ctx.font = '400 12px sans-serif';
      ctx.fillText('Collect skills · Earn fellowships · Dodge setbacks', W / 2, H / 2 - 4);
      const names = ['Undergrad', "Master's", 'PhD', 'Postdoc', 'PI'];
      LEVELS.forEach((lv, i) => {
        const bx = W / 2 - 135 + i * 67, by = H / 2 + 18;
        rr(bx, by, 60, 22, 11, lv.col);
        ctx.fillStyle = '#fff'; ctx.font = '500 9px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(names[i], bx + 30, by + 11);
      });
      const b = Math.abs(Math.sin(animF * 0.04)) * 5;
      rr(W / 2 - 88, H / 2 + 66 + b, 176, 36, 18, L.col);
      ctx.fillStyle = '#fff'; ctx.font = '500 14px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('Start game', W / 2, H / 2 + 84 + b);
      ctx.fillStyle = '#444'; ctx.font = '400 10px sans-serif';
      ctx.fillText('Space · click · tap to jump', W / 2, H / 2 + 118);
    }

    function cardBg(cw, ch) {
      ctx.fillStyle = 'rgba(5,5,15,0.7)'; ctx.fillRect(0, 0, W, H);
      const cx = (W - cw) / 2, cy = (H - ch) / 2;
      rr(cx, cy, cw, ch, 16, '#141420');
      ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 0.5;
      rr(cx, cy, cw, ch, 16, undefined, 'rgba(255,255,255,0.08)');
      return [cx, cy];
    }

    function drawLevelUp() {
      const L = LEVELS[lvl], NL = LEVELS[lvl + 1];
      const [cx, cy] = cardBg(392, 276);
      ctx.fillStyle = L.col; ctx.font = '500 11px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText('LEVEL COMPLETE!', W / 2, cy + 16);
      ctx.fillStyle = '#f0f0f0'; ctx.font = '500 20px sans-serif'; ctx.fillText(L.name, W / 2, cy + 36);
      ctx.fillStyle = '#555'; ctx.font = '400 11px sans-serif'; ctx.fillText('Skills mastered:', W / 2, cy + 68);
      L.skills.forEach((s, i) => {
        const col = i % 3, row = Math.floor(i / 3);
        const bw = 112, bx = W / 2 - 174 + col * 116, by = cy + 86 + row * 30;
        rr(bx, by, bw, 23, 12, L.col + '33');
        ctx.fillStyle = L.col; ctx.font = '400 10px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(s, bx + bw / 2, by + 11.5);
      });
      ctx.fillStyle = '#555'; ctx.font = '400 11px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText('Next: ' + NL.name + ' · ' + NL.sub, W / 2, cy + 180);
      rr((W - 154) / 2, cy + 206, 154, 34, 17, NL.col);
      ctx.fillStyle = '#fff'; ctx.font = '500 13px sans-serif'; ctx.textBaseline = 'middle';
      ctx.fillText('Continue \u2192', W / 2, cy + 223);
    }

    function drawOver() {
      const [cx, cy] = cardBg(342, 224);
      ctx.fillStyle = '#B03030'; ctx.font = '500 11px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText('SETBACK!', W / 2, cy + 18);
      ctx.fillStyle = '#f0f0f0'; ctx.font = '500 20px sans-serif'; ctx.fillText('Experiment Failed', W / 2, cy + 38);
      ctx.fillStyle = '#777'; ctx.font = '400 13px sans-serif';
      ctx.fillText('Even Einstein had rejections!', W / 2, cy + 76);
      ctx.fillText('Score: ' + score + '  ·  ' + LEVELS[Math.min(lvl, LEVELS.length - 1)].name, W / 2, cy + 100);
      rr((W - 152) / 2, cy + 146, 152, 34, 17, '#2C7BE5');
      ctx.fillStyle = '#fff'; ctx.font = '500 13px sans-serif'; ctx.textBaseline = 'middle';
      ctx.fillText('Try Again', W / 2, cy + 163);
    }

    function drawWin() {
      ctx.fillStyle = '#06060f'; ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < 60; i++) {
        const sx = (i * 73 + 11) % W, sy = (i * 59 + 7) % (H - 100);
        ctx.globalAlpha = 0.35 + 0.55 * Math.abs(Math.sin(animF * 0.025 + i * 0.4));
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(sx, sy, 1.2, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#D4A017'; ctx.font = '500 11px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('CONGRATULATIONS!', W / 2, H / 2 - 75);
      ctx.fillStyle = '#F5D066'; ctx.font = '500 27px sans-serif'; ctx.fillText('Principal Investigator!', W / 2, H / 2 - 45);
      ctx.fillStyle = '#aaa'; ctx.font = '400 13px sans-serif';
      ctx.fillText("You've navigated the full academic journey.", W / 2, H / 2 - 9);
      ctx.fillText('Final score: ' + score, W / 2, H / 2 + 18);
      ctx.fillStyle = '#666'; ctx.font = '400 11px sans-serif';
      ctx.fillText('Science is better with you in it!', W / 2, H / 2 + 44);
      const b = 0.5 + 0.5 * Math.sin(animF * 0.06);
      ctx.globalAlpha = 0.7 + 0.3 * b;
      rr((W - 162) / 2, H / 2 + 72, 162, 34, 17, '#D4A017');
      ctx.globalAlpha = 1; ctx.fillStyle = '#3A2800'; ctx.font = '500 13px sans-serif';
      ctx.fillText('Play Again', W / 2, H / 2 + 89);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      if (st === 'start') { drawStart(); return; }
      drawBg(); drawEnts(); drawPlayer(); drawHUD();
      if (st === 'levelup') drawLevelUp();
      else if (st === 'over') drawOver();
      else if (st === 'win') drawWin();
    }

    function input() {
      if (st === 'start') { st = 'play'; fullReset(); }
      else if (st === 'play') jump();
      else if (st === 'levelup') {
        lvl++; skillsGot = new Set(); grantsGot = 0; ents = [];
        spd = LEVELS[lvl].spd; st = 'play'; resetPlay();
      } else { st = 'play'; fullReset(); }
    }

    cv.addEventListener('click', () => input());
    cv.addEventListener('touchstart', e => { e.preventDefault(); input(); }, { passive: false });
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); input(); }
      if (e.code === 'Enter') input();
    });

    function loop() { animF++; update(); draw(); requestAnimationFrame(loop); }
    fullReset();
    loop();
  </script>
</body>
</html>
